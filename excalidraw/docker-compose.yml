services:
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    network_mode: "bridge"
    healthcheck:
      disable: true
    labels:
      - traefik.enable=true
      - traefik.http.routers.excalidraw.rule=Host(`excalidraw`)
      - traefik.http.services.excalidraw.loadbalancer.server.port=80
